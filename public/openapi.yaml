openapi: 3.0.0

info:
  title: TodoApp API (CodeIgniter 4 + JWT)
  version: 1.0.0
  description: REST API für Todo Verwaltung mit Authentifizierung, JWT, Kategorien, Logs und API Keys

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: User
  - name: Todos
  - name: Categories
  - name: System

# =====================================================
# AUTH
# =====================================================

paths:

  /login:
    post:
      tags: [Auth]
      summary: Benutzer Login und JWT Generierung
      description: |
        Dieser Endpunkt authentifiziert einen Benutzer anhand von E-Mail und Passwort.

        Bei erfolgreicher Anmeldung wird ein JWT Token erstellt, welches für geschützte Endpunkte benötigt wird.

        Dieses Token muss danach im Authorization Header als Bearer Token gesendet werden.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
            example:
              email: test@test.ch
              password: 123456
      responses:
        "200":
          description: Login erfolgreich
          content:
            application/json:
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6...

        "401":
          description: Login fehlgeschlagen
          content:
            application/json:
              example:
                error: Invalid credentials

  # =====================================================
  # USER (JWT)
  # =====================================================

  /user:
    get:
      tags: [User]
      summary: Aktuellen Benutzer abrufen
      description: |
        Gibt die Daten des aktuell eingeloggten Benutzers zurück.

        Zugriff ist nur mit gültigem JWT Token möglich,
        welches im Authorization Header gesendet werden muss.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Benutzer gefunden
          content:
            application/json:
              example:
                id: 1
                email: test@test.ch
                username: testuser

        "401":
          description: Ungültiger oder fehlender Token
          content:
            application/json:
              example:
                message: Invalid token

  # =====================================================
  # TODOS
  # =====================================================

  /todos:
    get:
      tags: [Todos]
      summary: Alle Todos abrufen
      description: |
        Dieser Endpunkt gibt alle Todos aus der Datenbank zurück.

        Jedes Todo enthält:
        - Titel
        - Beschreibung
        - Status (completed)
        - Kategorie-ID

        Es werden keine Parameter benötigt.
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              example:
                - id: 1
                  title: Hausaufgaben
                  description: Math lösen
                  completed: false
                  category_id: 1

    post:
      tags: [Todos]
      summary: Neues Todo erstellen
      description: |
        Erstellt ein neues Todo in der Datenbank.

        Die Daten werden im JSON Format im Request Body übergeben.
        Pflichtfelder sind title und category_id.

        Optional können description und completed gesetzt werden.
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Projekt fertigstellen
              description: API Dokumentation schreiben
              completed: false
              category_id: 1
      responses:
        "201":
          description: Todo erfolgreich erstellt
          content:
            application/json:
              example:
                message: Todo wurde erstellt

  /todos/{id}:
    get:
      tags: [Todos]
      summary: Todo nach ID abrufen
      description: |
        Gibt ein einzelnes Todo anhand der ID zurück.

        Die ID wird im URL Pfad übergeben.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Todo gefunden
          content:
            application/json:
              example:
                id: 1
                title: Hausaufgaben
                completed: false

    put:
      tags: [Todos]
      summary: Todo aktualisieren
      description: |
        Aktualisiert ein bestehendes Todo anhand der ID.

        Die neuen Werte werden im JSON Body übergeben.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: geändert
              completed: true
      responses:
        "200":
          description: Todo aktualisiert
          content:
            application/json:
              example:
                message: Todo erfolgreich aktualisiert

    delete:
      tags: [Todos]
      summary: Todo löschen
      description: |
        Löscht ein Todo anhand der übergebenen ID.

        Die ID wird im URL Pfad übergeben und identifiziert
        den Datensatz eindeutig in der Datenbank.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Erfolgreich gelöscht
          content:
            application/json:
              example:
                message: Todo wurde gelöscht

        "404":
          description: Todo nicht gefunden
          content:
            application/json:
              example:
                error: Todo existiert nicht

  # =====================================================
  # CATEGORIES
  # =====================================================

  /categories:
    get:
      tags: [Categories]
      summary: Alle Kategorien abrufen
      description: Gibt alle vorhandenen Kategorien aus der Datenbank zurück
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              example:
                - id: 1
                  name: Schule

    post:
      tags: [Categories]
      summary: Kategorie erstellen
      description: Erstellt eine neue Kategorie mit Namen
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Arbeit
      responses:
        "201":
          description: Kategorie erstellt
    
      /categories/{id}:
    delete:
      tags: [Categories]
      summary: Kategorie löschen
      description: |
        Löscht eine Kategorie nur wenn sie keine Todos enthält.

        - 400 wenn ID der Kategorie ungültig ist
        - 404 wenn Kategorie nicht existiert
        - 409 wenn Kategorie noch Todos enthält
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kategorie gelöscht
          content:
            application/json:
              example:
                message: Kategorie erfolgreich gelöscht.
        "400":
            description: Ungültige ID
            content:
              application/json:
                example:
                  id: Ungültige ID

        "409":
          description: Kategorie nicht leer
          content:
            application/json:
              example:
                error: Kategorie nicht leer

        "404":
          description: Kategorie nicht gefunden
          content:
            application/json:
              example:
                error: Kategorie nicht gefunden

  # =====================================================
  # API KEYS
  # =====================================================

  /api-keys:
    get:
      tags: [System]
      summary: API Keys anzeigen
      description: Gibt alle gespeicherten API Keys zurück
      responses:
        "200":
          description: Liste der API Keys
          content:
            application/json:
              example:
                - id: 1
                  key: abc123
                  user: admin

  # =====================================================
  # LOGS
  # =====================================================

  /logs:
    get:
      tags: [System]
      summary: API Logs abrufen
      description: Gibt alle API Requests aus dem Log System zurück
      responses:
        "200":
          description: Log Liste
          content:
            application/json:
              example:
                - id: 1
                  method: GET
                  endpoint: /todos
                  status: 200
                  api_key: abc123

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# =====================================================
# Persönliches Feedback
# =====================================================

x-project-feedback: |
  Unserer Meinung nach hat das Projekt Spass gemacht, und es war nicht so kompliziert, wie wir anfangs gedacht hatten.
  Das Verständnis für HTTP-Methoden und JSON Datenübertragung hat sich bei uns beiden verbessert.
  Gut gelungen ist unsere Projektstruktur und das Zusammenarbeiten im Team.
  Herausfordernd war das Debugging bei Fehlerhaften Requests sowie die Unit Tests zu schreiben.
  Bei diesem üK hatten wir nicht so Zeitmangel wie beim vorherigen, da wir alles besser eingeplant haben.
  Geplant war eigentlich, dass wir dieses Projekt zusammen mit Fabian bearbeitet hätten, aber aufgrund seiner Absenz 
  haben wir es zu zweit machen müssen.
  Im Grossen und Ganzen war das eine positive Erfahrung für uns und wir haben viel Neues dazugelernt.