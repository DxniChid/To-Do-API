openapi: 3.0.0

info:
  title: TodoApp API (CodeIgniter 4 + JWT)
  version: 1.0.0
  description: REST API für Todo Verwaltung mit Authentifizierung, JWT, Kategorien, Logs und API Keys

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: User
  - name: Todos
  - name: Categories
  - name: System

paths:

  # =====================================================
  # AUTH
  # =====================================================

  /login:
    post:
      tags: [Auth]
      summary: Benutzer Login und JWT Generierung
      description: |
        Dieser Endpunkt authentifiziert einen Benutzer anhand von E-Mail und Passwort.

        Bei erfolgreicher Anmeldung wird ein JWT Token erstellt, welches für geschützte Endpunkte benötigt wird.

        Dieses Token muss danach im Authorization Header als Bearer Token gesendet werden.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
            example:
              email: test@test.ch
              password: 123456
      responses:
        "200":
          description: Login erfolgreich
          content:
            application/json:
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6...
        "401":
          description: Login fehlgeschlagen
          content:
            application/json:
              example:
                error: Invalid credentials

  # =====================================================
  # USER (JWT)
  # =====================================================

  /user:
    get:
      tags: [User]
      summary: Aktuellen Benutzer abrufen (JWT geschützt)
      description: |
        Gibt die Daten des aktuell eingeloggten Benutzers zurück.

        Der Zugriff ist nur mit einem gültigen JWT Token möglich.
        Dieses muss im Authorization Header als Bearer Token gesendet werden.

        Ablauf im Backend:
        - Authorization Header wird geprüft
        - JWT Token wird validiert
        - User ID wird aus Token gelesen
        - User wird aus Datenbank geladen

        Fehler werden direkt aus dem Auth-Prozess zurückgegeben.
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Benutzer erfolgreich gefunden
          content:
            application/json:
              example:
                id: 1
                email: test@test.ch
                username: testuser

        "401":
          description: Unauthorized (alle Auth-Fehler)
          content:
            application/json:
              examples:

                missing_or_invalid_header:
                  summary: Fehlender oder ungültiger Authorization Header
                  value:
                    message: Missing or invalid Authorization header

                invalid_token:
                  summary: Token ist ungültig oder abgelaufen
                  value:
                    message: Invalid token

                user_not_found:
                  summary: Benutzer existiert nicht mehr in der Datenbank
                  value:
                    message: User not found

  # =====================================================
  # TODOS
  # =====================================================

  /todos:
    get:
      tags: [Todos]
      summary: Alle Todos abrufen
      description: |
        Dieser Endpunkt gibt alle Todos aus der Datenbank zurück.

        Jedes Todo enthält:
        - Titel
        - Beschreibung
        - Status (completed)
        - Kategorie-ID
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              example:
                - id: 1
                  title: Hausaufgaben
                  description: Math lösen
                  completed: false
                  category_id: 1

    post:
      tags: [Todos]
      summary: Neues Todo erstellen
      description: |
        Erstellt ein neues Todo in der Datenbank.

        Pflichtfelder: title, category_id
        Optional: description, completed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - category_id
              properties:
                title:
                  type: string
                description:
                  type: string
                completed:
                  type: boolean
                category_id:
                  type: integer
            example:
              title: Projekt fertigstellen
              description: API Dokumentation schreiben
              completed: false
              category_id: 1
      responses:
        "201":
          description: Todo erfolgreich erstellt
          content:
            application/json:
              example:
                message: Todo wurde erstellt

  /todos/{id}:
    get:
      tags: [Todos]
      summary: Todo nach ID abrufen
      description: Gibt ein einzelnes Todo anhand der ID zurück
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Todo gefunden
          content:
            application/json:
              example:
                id: 1
                title: Hausaufgaben
                completed: false

    put:
      tags: [Todos]
      summary: Todo aktualisieren
      description: Aktualisiert ein bestehendes Todo anhand der ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: geändert
              completed: true
      responses:
        "200":
          description: Todo aktualisiert
          content:
            application/json:
              example:
                message: Todo erfolgreich aktualisiert

    delete:
      tags: [Todos]
      summary: Todo löschen
      description: |
        Löscht ein Todo anhand der übergebenen ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Erfolgreich gelöscht
          content:
            application/json:
              example:
                message: Todo wurde gelöscht
        "404":
          description: Todo nicht gefunden
          content:
            application/json:
              example:
                error: Todo existiert nicht

  # =====================================================
  # CATEGORIES
  # =====================================================

  /categories:
    get:
      tags: [Categories]
      summary: Alle Kategorien abrufen
      description: Gibt alle Kategorien zurück
      responses:
        "200":
          description: Erfolgreiche Abfrage
          content:
            application/json:
              example:
                - id: 1
                  name: Schule

    post:
      tags: [Categories]
      summary: Kategorie erstellen
      description: Erstellt eine neue Kategorie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
            example:
              name: Arbeit
      responses:
        "201":
          description: Kategorie erstellt

  /categories/{id}:
    delete:
      tags: [Categories]
      summary: Kategorie löschen
      description: Löscht eine Kategorie nur, wenn sie leer ist und die ID vorhanden ist.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kategorie gelöscht
          content:
            application/json:
              example:
                message: Kategorie erfolgreich gelöscht
        "404":
          description: Kategorie nicht gefunden
          content:
            application/json:
              example:
                message: Kategorie nicht gefunden
        "409":
          description: Kategorie nicht leer
          content:
            application/json:
              example:
                message: Kategorie nicht leer

  # =====================================================
  # API KEYS
  # =====================================================

  /api-keys:
    get:
      tags: [System]
      summary: API Keys anzeigen
      description: Gibt alle API Keys zurück
      responses:
        "200":
          description: Liste der API Keys
          content:
            application/json:
              example:
                - id: 1
                  key: abc123
                  user: admin

  # =====================================================
  # LOGS
  # =====================================================

  /logs:
    get:
      tags: [System]
      summary: API Logs abrufen
      description: Gibt alle Logs zurück
      responses:
        "200":
          description: Log Liste
          content:
            application/json:
              example:
                - id: 1
                  method: GET
                  endpoint: /todos
                  status: 200
                  api_key: abc123

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# =====================================================
# Persönliches Feedback
# =====================================================

x-project-feedback: |
  Unserer Meinung nach hat das Projekt Spass gemacht, und es war nicht so kompliziert, wie wir anfangs gedacht hatten.
  Das Verständnis für HTTP-Methoden und JSON Datenübertragung hat sich bei uns beiden verbessert.
  Gut gelungen ist unsere Projektstruktur und das Zusammenarbeiten im Team.
  Herausfordernd war das Debugging bei fehlerhaften Requests sowie die Unit Tests zu schreiben.
  Bei diesem üK hatten wir nicht so Zeitmangel wie beim vorherigen, da wir alles besser eingeplant haben.
  Geplant war eigentlich, dass wir dieses Projekt zusammen mit Fabian bearbeitet hätten, aber aufgrund seiner Absenz haben wir es zu zweit machen müssen.
  Im Grossen und Ganzen war das eine positive Erfahrung für uns und wir haben viel Neues dazugelernt.